name: Update READMEs
 
on:
  push:
    branches: [main]
 
jobs:
  update-readmes:
    runs-on: ubuntu-latest
 
    permissions:
      contents: write
 
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Update problem READMEs
        run: python .github/scripts/build_problem_readme.py
 
      - name: Update main README
        run: python .github/scripts/update_main_readme.py
 
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "**/README.md" README.md
          git diff --staged --quiet || git commit -m "chore: update READMEs [skip ci]"
          git push